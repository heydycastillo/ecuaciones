<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Monitoreo Térmico de Data Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-main:#0a0a0d;
    --bg-main-2:#0d0d11;
    --panel-bg:#151519;
    --card-bg:#1b1b21;
    --card-bg-2:#1f1f26;
    --border:#2a2a33;
    --border-soft:#232329;
    --pink:#ff3d9a;
    --pink-dim:#e0308a;
    --pink-glow:rgba(255,61,154,0.35);
    --text-primary:#f2f2f5;
    --text-secondary:#8f8f9c;
    --text-tertiary:#63636e;
    --green:#2ee6a6;
    --green-dim:rgba(46,230,166,0.15);
    --yellow:#ffc23d;
    --yellow-dim:rgba(255,194,61,0.15);
    --red:#ff4d5e;
    --red-dim:rgba(255,77,94,0.18);
    --cyan:#38d6f5;
    --cyan-dim:rgba(56,214,245,0.16);
    --mono:'JetBrains Mono', monospace;
    --sans:'Inter', sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(255,61,154,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(255,61,154,0.04), transparent 45%),
      var(--bg-main);
    color:var(--text-primary);
    font-family:var(--sans);
    min-height:100vh;
    padding:22px;
  }

  /* ===== TOP BAR ===== */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel-bg);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 26px;
    margin-bottom:20px;
    gap:24px;
    flex-wrap:wrap;
    position:relative;
    overflow:hidden;
  }
  .topbar::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg, transparent, var(--pink), transparent);
    opacity:.7;
  }
  .topbar-title{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .topbar-title .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--pink);
    box-shadow:0 0 10px 2px var(--pink-glow);
    animation:pulseDot 2.4s infinite ease-in-out;
  }
  @keyframes pulseDot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.25);}}
  .topbar-title h1{
    font-size:17px;
    font-weight:700;
    letter-spacing:.3px;
  }
  .topbar-title span{
    display:block;
    font-size:11px;
    color:var(--text-tertiary);
    font-family:var(--mono);
    letter-spacing:1px;
    margin-top:2px;
    text-transform:uppercase;
  }
  .topbar-meta{
    display:flex;
    align-items:center;
    gap:28px;
    flex-wrap:wrap;
  }
  .meta-item{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .meta-label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1.2px;
    color:var(--text-tertiary);
    font-family:var(--mono);
  }
  .meta-value{
    font-size:15px;
    font-weight:600;
    font-family:var(--mono);
  }
  .status-pill{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 16px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.5px;
    text-transform:uppercase;
    font-family:var(--mono);
    border:1px solid;
    transition:all .4s ease;
  }
  .status-pill .led{width:8px;height:8px;border-radius:50%;}
  .status-pill.ok{color:var(--green);border-color:rgba(46,230,166,.35);background:var(--green-dim);}
  .status-pill.ok .led{background:var(--green);box-shadow:0 0 8px 1px var(--green);}
  .status-pill.warn{color:var(--yellow);border-color:rgba(255,194,61,.35);background:var(--yellow-dim);}
  .status-pill.warn .led{background:var(--yellow);box-shadow:0 0 8px 1px var(--yellow);}
  .status-pill.crit{color:var(--red);border-color:rgba(255,77,94,.4);background:var(--red-dim);}
  .status-pill.crit .led{background:var(--red);box-shadow:0 0 8px 1px var(--red);animation:blinkLed 1s infinite;}
  @keyframes blinkLed{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* ===== LAYOUT ===== */
  .main-layout{
    display:grid;
    grid-template-columns:1fr 360px;
    gap:20px;
    align-items:start;
  }
  @media (max-width:980px){
    .main-layout{grid-template-columns:1fr;}
  }

  .panel-heading{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .panel-heading h2{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--text-secondary);
    font-family:var(--mono);
    font-weight:600;
  }
  .panel-heading h2 b{color:var(--pink);}
  .panel-sub{
    font-size:11px;
    color:var(--text-tertiary);
    font-family:var(--mono);
  }

  /* ===== SERVER GRID ===== */
  .servers-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
  }
  @media (max-width:700px){
    .servers-grid{grid-template-columns:repeat(2,1fr);}
  }

  .server-card{
    background:linear-gradient(160deg, var(--card-bg-2), var(--card-bg));
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
    position:relative;
    overflow:hidden;
    transition:border-color .5s ease, box-shadow .5s ease, transform .3s ease;
  }
  .server-card::after{
    content:'';
    position:absolute;
    left:14px;top:0;bottom:0;
    width:3px;
    background:var(--border-soft);
    transition:background .5s ease, box-shadow .5s ease;
  }
  .server-card .rack-lines{
    position:absolute;
    right:14px;top:14px;bottom:14px;
    width:26px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    opacity:.5;
  }
  .server-card .rack-lines div{
    height:2px;
    background:var(--border);
    border-radius:2px;
  }

  .server-card.normal{border-color:var(--border);}
  .server-card.normal::after{background:var(--green);box-shadow:0 0 8px var(--green);}

  .server-card.warning{border-color:rgba(255,194,61,.4);}
  .server-card.warning::after{background:var(--yellow);box-shadow:0 0 10px var(--yellow);}

  .server-card.critical{
    border-color:var(--red);
    box-shadow:0 0 0 1px rgba(255,77,94,.3), 0 0 26px rgba(255,77,94,.28);
    animation:criticalPulse 1.6s infinite ease-in-out;
  }
  .server-card.critical::after{background:var(--red);box-shadow:0 0 12px var(--red);}
  @keyframes criticalPulse{
    0%,100%{box-shadow:0 0 0 1px rgba(255,77,94,.3), 0 0 18px rgba(255,77,94,.22);}
    50%{box-shadow:0 0 0 1px rgba(255,77,94,.55), 0 0 36px rgba(255,77,94,.45);}
  }

  .server-card.cooling{
    border-color:var(--cyan);
    box-shadow:0 0 0 1px rgba(56,214,245,.3), 0 0 22px rgba(56,214,245,.25);
    animation:coolingPulse 2.2s infinite ease-in-out;
  }
  .server-card.cooling::after{background:var(--cyan);box-shadow:0 0 12px var(--cyan);}
  @keyframes coolingPulse{
    0%,100%{box-shadow:0 0 0 1px rgba(56,214,245,.25), 0 0 14px rgba(56,214,245,.2);}
    50%{box-shadow:0 0 0 1px rgba(56,214,245,.5), 0 0 30px rgba(56,214,245,.4);}
  }

  .server-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:20px;
    padding-left:8px;
  }
  .server-id{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-tertiary);
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .server-id b{
    display:block;
    font-size:19px;
    color:var(--text-primary);
    font-weight:700;
    letter-spacing:0;
    margin-top:2px;
  }
  .led-indicator{
    width:11px;height:11px;border-radius:50%;
    margin-top:4px;
    flex-shrink:0;
  }
  .led-indicator.normal{background:var(--green);box-shadow:0 0 8px 2px var(--green);}
  .led-indicator.warning{background:var(--yellow);box-shadow:0 0 8px 2px var(--yellow);}
  .led-indicator.critical{background:var(--red);box-shadow:0 0 10px 3px var(--red);animation:blinkLed .9s infinite;}
  .led-indicator.cooling{background:var(--cyan);box-shadow:0 0 10px 3px var(--cyan);}

  .server-temp{
    font-family:var(--mono);
    font-size:34px;
    font-weight:700;
    padding-left:8px;
    line-height:1;
    transition:color .4s ease;
  }
  .server-temp.normal{color:var(--green);}
  .server-temp.warning{color:var(--yellow);}
  .server-temp.critical{color:var(--red);}
  .server-temp.cooling{color:var(--cyan);}
  .server-temp span{font-size:16px;color:var(--text-tertiary);font-weight:500;}

  .server-status{
    padding-left:8px;
    margin-top:8px;
    font-size:11.5px;
    font-weight:600;
    letter-spacing:.5px;
    text-transform:uppercase;
    font-family:var(--mono);
  }
  .server-status.normal{color:var(--green);}
  .server-status.warning{color:var(--yellow);}
  .server-status.critical{color:var(--red);}
  .server-status.cooling{color:var(--cyan);}

  /* ===== ALERTS PANEL ===== */
  .alerts-panel{
    background:var(--panel-bg);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    min-height:420px;
    display:flex;
    flex-direction:column;
  }
  .alerts-list{
    display:flex;
    flex-direction:column;
    gap:12px;
    flex:1;
    margin-bottom:16px;
  }
  .alert-empty{
    color:var(--text-tertiary);
    font-family:var(--mono);
    font-size:12.5px;
    text-align:center;
    padding:40px 10px;
    border:1px dashed var(--border);
    border-radius:12px;
  }
  .alert-card{
    background:var(--red-dim);
    border:1px solid rgba(255,77,94,.35);
    border-radius:12px;
    padding:14px 16px;
    animation:slideIn .4s ease;
  }
  @keyframes slideIn{from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:translateY(0);}}
  .alert-card h3{
    color:var(--red);
    font-size:13.5px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }
  .alert-card h3::before{
    content:'⚠';
    font-size:14px;
  }
  .alert-row{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    font-family:var(--mono);
    color:var(--text-secondary);
    padding:3px 0;
  }
  .alert-row b{color:var(--text-primary);font-weight:600;}

  .btn-calc{
    width:100%;
    background:var(--pink);
    color:#0a0a0d;
    border:none;
    padding:14px;
    border-radius:12px;
    font-family:var(--sans);
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    letter-spacing:.2px;
    transition:transform .15s ease, box-shadow .3s ease, background .3s ease;
    box-shadow:0 0 0 0 rgba(255,61,154,0);
  }
  .btn-calc:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow:0 8px 22px rgba(255,61,154,.35);
    background:var(--pink-dim);
  }
  .btn-calc:disabled{
    background:var(--card-bg-2);
    color:var(--text-tertiary);
    cursor:not-allowed;
  }

  /* ===== MATH PANEL (overlay) ===== */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(5,5,7,.78);
    backdrop-filter:blur(4px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  .overlay.show{opacity:1; pointer-events:all;}

  .math-console{
    width:min(720px, 92vw);
    max-height:86vh;
    overflow-y:auto;
    background:#111116;
    border:1px solid var(--border);
    border-radius:18px;
    padding:0;
    box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,61,154,.08);
  }
  .console-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 22px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    background:#111116;
    z-index:2;
  }
  .console-head h2{
    font-size:13px;
    font-family:var(--mono);
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--pink);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .console-head .traffic{display:flex;gap:6px;}
  .console-head .traffic span{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .console-head .close-btn{
    background:none;border:1px solid var(--border);color:var(--text-secondary);
    width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s ease;
  }
  .console-head .close-btn:hover{color:var(--red);border-color:var(--red);}

  .console-body{padding:22px;font-family:var(--mono);}

  .step-block{
    margin-bottom:20px;
    opacity:0;
    transform:translateY(10px);
    animation:stepIn .5s ease forwards;
    border-left:2px solid var(--border);
    padding-left:16px;
  }
  @keyframes stepIn{to{opacity:1; transform:translateY(0);}}
  .step-block .step-label{
    color:var(--pink);
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .step-block .step-label::before{content:'▸';}
  .formula{
    background:#0b0b0e;
    border:1px solid var(--border-soft);
    border-radius:8px;
    padding:12px 16px;
    font-size:16px;
    color:var(--text-primary);
    margin:8px 0;
    letter-spacing:.5px;
  }
  .formula b{color:var(--pink);}
  .step-text{
    font-size:12.5px;
    color:var(--text-secondary);
    line-height:1.7;
  }
  .step-text .val{color:var(--green);font-weight:600;}
  .cursor-blink{
    display:inline-block;
    width:7px;height:14px;
    background:var(--pink);
    margin-left:4px;
    animation:blinkLed .9s infinite;
    vertical-align:middle;
  }

  /* ===== RESULT CARD ===== */
  .result-card{
    margin-top:8px;
    background:linear-gradient(160deg, rgba(255,61,154,.1), rgba(255,61,154,.02));
    border:1px solid rgba(255,61,154,.4);
    border-radius:14px;
    padding:22px;
    opacity:0;
    transform:translateY(10px);
    animation:stepIn .6s ease forwards;
  }
  .result-card h3{
    color:var(--pink);
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    margin-bottom:16px;
    font-family:var(--mono);
  }
  .data-log{
    background:var(--card-bg);
    border:1px solid var(--border-soft);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:16px;
  }
  .data-log-title{
    font-size:11px;
    color:var(--text-tertiary);
    text-transform:uppercase;
    letter-spacing:1.2px;
    font-family:var(--mono);
    font-weight:700;
    margin-bottom:8px;
  }
  .btn-accept{
    width:100%;
    margin-top:16px;
    background:var(--pink);
    color:#0a0a0d;
    border:none;
    padding:13px;
    border-radius:10px;
    font-family:var(--sans);
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    letter-spacing:.3px;
    transition:transform .15s ease, box-shadow .3s ease, background .3s ease;
  }
  .btn-accept:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 22px rgba(255,61,154,.35);
    background:var(--pink-dim);
  }
  .result-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px 20px;
    margin-bottom:16px;
  }
  .result-item{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .result-item .r-label{
    font-size:10.5px;
    color:var(--text-tertiary);
    text-transform:uppercase;
    letter-spacing:1px;
    font-family:var(--mono);
  }
  .result-item .r-value{
    font-size:16px;
    font-weight:700;
    font-family:var(--mono);
    color:var(--text-primary);
  }
  .result-time{
    background:rgba(255,61,154,.12);
    border:1px solid rgba(255,61,154,.4);
    border-radius:10px;
    padding:14px;
    text-align:center;
    margin-bottom:14px;
  }
  .result-time .r-label{font-size:10.5px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);}
  .result-time .r-value{font-size:26px;color:var(--pink);font-weight:800;font-family:var(--mono);}
  .result-footer{
    font-size:12px;
    color:var(--text-secondary);
    font-family:var(--mono);
    border-top:1px solid var(--border);
    padding-top:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .result-footer b{color:var(--red);}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-title">
      <span class="dot"></span>
      <div>
        <h1>Sistema de Monitoreo Térmico de Data Center</h1>
        <span>DCX-THERMAL // v2.4</span>
      </div>
    </div>
    <div class="topbar-meta">
      <div class="meta-item">
        <span class="meta-label">Temp. Ambiente</span>
        <span class="meta-value" id="ambientTemp">22.0°C</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Fecha y hora</span>
        <span class="meta-value" id="dateTime">--</span>
      </div>
      <div class="status-pill ok" id="systemStatus">
        <span class="led"></span>
        <span id="systemStatusText">Operativo</span>
      </div>
    </div>
  </div>

  <div class="main-layout">
    <div class="servers-panel">
      <div class="panel-heading">
        <h2>Sala de <b>Servidores</b></h2>
        <span class="panel-sub" id="rackCount">6 unidades activas</span>
      </div>
      <div class="servers-grid" id="serversGrid"></div>
    </div>

    <div class="alerts-panel">
      <div class="panel-heading">
        <h2>Alertas del <b>Sistema</b></h2>
      </div>
      <div class="alerts-list" id="alertsList">
        <div class="alert-empty">Sin eventos registrados.<br>Monitoreando temperatura de racks…</div>
      </div>
      <button class="btn-calc" id="calcBtn" disabled>Calcular tiempo de enfriamiento</button>
    </div>
  </div>

  <!-- MATH OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="math-console">
      <div class="console-head">
        <h2>◆ Desarrollo Matemático — Ley de Enfriamiento de Newton</h2>
        <button class="close-btn" id="closeBtn">✕</button>
      </div>
      <div class="console-body" id="consoleBody"></div>
    </div>
  </div>

<script>
/* ===================== STATE ===================== */
const AMBIENT = 22;
const SAFE_TEMP = 40;
const CRITICAL_LIMIT = 80;
const WARNING_LIMIT = 60;

const servers = [];
for(let i=1;i<=6;i++){
  servers.push({
    id:i,
    temp: +(33 + Math.random()*8).toFixed(1),
    status:'normal',
    heating:false
  });
}

let overheatedServer = null;
let alertData = null;

/* ===================== RENDER ===================== */
const grid = document.getElementById('serversGrid');

function statusFromTemp(t){
  if(t >= CRITICAL_LIMIT) return 'critical';
  if(t >= WARNING_LIMIT) return 'warning';
  return 'normal';
}

function statusLabel(s){
  if(s==='critical') return 'Crítico';
  if(s==='warning') return 'Advertencia';
  if(s==='cooling') return 'Enfriando';
  return 'Normal';
}

function renderServers(){
  grid.innerHTML = servers.map(s => `
    <div class="server-card ${s.status}">
      <div class="rack-lines"><div></div><div></div><div></div><div></div><div></div></div>
      <div class="server-top">
        <div class="server-id">Servidor<b>#${String(s.id).padStart(2,'0')}</b></div>
        <div class="led-indicator ${s.status}"></div>
      </div>
      <div class="server-temp ${s.status}">${s.temp.toFixed(1)}<span>°C</span></div>
      <div class="server-status ${s.status}">${statusLabel(s.status)}</div>
    </div>
  `).join('');
}
renderServers();

/* ===================== CLOCK ===================== */
function updateClock(){
  const now = new Date();
  const opts = {day:'2-digit', month:'2-digit', year:'numeric'};
  const dateStr = now.toLocaleDateString('es-ES', opts);
  const timeStr = now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('dateTime').textContent = `${dateStr}  ${timeStr}`;
}
updateClock();
setInterval(updateClock, 1000);

/* ambient temperature is fixed, shown once */
document.getElementById('ambientTemp').textContent = AMBIENT.toFixed(1)+'°C';

/* ===================== SYSTEM STATUS ===================== */
function updateSystemStatus(){
  const pill = document.getElementById('systemStatus');
  const text = document.getElementById('systemStatusText');
  const hasCritical = servers.some(s=>s.status==='critical');
  const hasCooling = servers.some(s=>s.status==='cooling');
  const hasWarning = servers.some(s=>s.status==='warning');
  pill.classList.remove('ok','warn','crit');
  if(hasCritical){ pill.classList.add('crit'); text.textContent='Crítico'; }
  else if(hasCooling){ pill.classList.add('warn'); text.textContent='Enfriando'; }
  else if(hasWarning){ pill.classList.add('warn'); text.textContent='Advertencia'; }
  else { pill.classList.add('ok'); text.textContent='Operativo'; }
}
updateSystemStatus();

/* ===================== NORMAL FLUCTUATION ===================== */
setInterval(()=>{
  servers.forEach(s=>{
    if(s.heating || s.status==='cooling') return;
    s.temp = +(s.temp + (Math.random()*1.2 - 0.6)).toFixed(1);
    if(s.temp < 30) s.temp = 30;
    if(s.temp > 45) s.temp = 45;
    s.status = statusFromTemp(s.temp);
  });
  renderServers();
  updateSystemStatus();
}, 2500);

/* ===================== OVERHEAT SIMULATION ===================== */
function scheduleOverheat(delayMs){
  setTimeout(triggerOverheatCycle, delayMs);
}

function triggerOverheatCycle(){
  const candidates = servers.filter(s => s.status === 'normal' || s.status === 'warning');
  if(candidates.length === 0){
    scheduleOverheat(15000); // no eligible server right now, try again shortly
    return;
  }
  const target = candidates[Math.floor(Math.random()*candidates.length)];
  target.heating = true;
  overheatedServer = target;

  const startTemp = target.temp;
  const finalTemp = +(84 + Math.random()*10).toFixed(1); // 84 - 94 °C

  const startTime = Date.now();
  const duration = 9000;

  const heatInterval = setInterval(()=>{
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed/duration, 1);
    target.temp = +(startTemp + (finalTemp-startTemp)*progress).toFixed(1);
    target.status = statusFromTemp(target.temp);
    renderServers();
    updateSystemStatus();

    if(progress >= 1){
      clearInterval(heatInterval);
      target.temp = finalTemp;
      target.status = 'critical';
      renderServers();
      updateSystemStatus();
      triggerAlert(target, finalTemp, new Date());
    }
  }, 200);
}

scheduleOverheat(6000);

/* ===================== ALERTS ===================== */
function triggerAlert(server, temp, time){
  alertData = {
    serverId: server.id,
    t0: temp,
    ambient: AMBIENT,
    safe: SAFE_TEMP,
    time: time
  };

  const list = document.getElementById('alertsList');
  list.innerHTML = `
    <div class="alert-card">
      <h3>Servidor ${server.id} sobrecalentado</h3>
      <div class="alert-row"><span>Temperatura actual</span><b>${temp.toFixed(1)}°C</b></div>
      <div class="alert-row"><span>Temperatura ambiente</span><b>${AMBIENT.toFixed(1)}°C</b></div>
      <div class="alert-row"><span>Temperatura segura</span><b>${SAFE_TEMP}°C</b></div>
      <div class="alert-row"><span>Hora del evento</span><b>${time.toLocaleTimeString('es-ES')}</b></div>
    </div>
  `;
  document.getElementById('calcBtn').disabled = false;
}

function clearAlert(){
  alertData = null;
  const list = document.getElementById('alertsList');
  list.innerHTML = `<div class="alert-empty">Sin eventos registrados.<br>Monitoreando temperatura de racks…</div>`;
  document.getElementById('calcBtn').disabled = true;
}

/* ===================== MATH ENGINE ===================== */
const overlay = document.getElementById('overlay');
const consoleBody = document.getElementById('consoleBody');
document.getElementById('closeBtn').addEventListener('click', ()=> overlay.classList.remove('show'));
document.getElementById('calcBtn').addEventListener('click', runCalculation);

function runCalculation(){
  if(!alertData) return;

  const { serverId, t0, ambient: Tm, safe: Tsafe } = alertData;

  // --- Hidden "true" cooling coefficient for this hardware, used to generate a realistic 2nd measurement ---
  const Ktrue = 0.015 + Math.random()*0.012; // per minute
  const t1 = 20; // minutes, second measurement checkpoint
  const C = +(t0 - Tm).toFixed(2);
  const T1 = +(Tm + C*Math.exp(-Ktrue*t1)).toFixed(1); // simulated measured temp at t1

  // Recompute K from the (rounded) measured data, as a real system would
  const K = +(-Math.log((T1 - Tm)/C)/t1).toFixed(4);

  // Time to reach safe temperature
  const tCool = -Math.log((Tsafe - Tm)/C)/K;
  const tCoolRounded = Math.round(tCool);

  overlay.classList.add('show');
  consoleBody.innerHTML = '';
  showResult(serverId, t0, Tm, Tsafe, C, K, tCoolRounded, t1, T1);

  document.getElementById('calcBtn').disabled = true;
}

function showResult(serverId, t0, Tm, Tsafe, C, K, tCool, t1, T1){
  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <h3>Resultado — Servidor ${serverId}</h3>
    <div class="data-log">
      <div class="data-log-title">Datos registrados</div>
      <div class="alert-row"><span>Temperatura inicial</span><b>${t0.toFixed(1)}°C</b></div>
      <div class="alert-row"><span>Temperatura ambiente</span><b>${Tm.toFixed(0)}°C</b></div>
      <div class="alert-row"><span>Segunda medición — Tiempo</span><b>${t1} minutos</b></div>
      <div class="alert-row"><span>Segunda medición — Temperatura</span><b>${T1.toFixed(1)}°C</b></div>
    </div>
    <div class="result-grid">
      <div class="result-item"><span class="r-label">Temp. inicial</span><span class="r-value">${t0.toFixed(1)}°C</span></div>
      <div class="result-item"><span class="r-label">Temp. ambiente</span><span class="r-value">${Tm.toFixed(1)}°C</span></div>
      <div class="result-item"><span class="r-label">Temp. segura</span><span class="r-value">${Tsafe}°C</span></div>
      <div class="result-item"><span class="r-label">Constante C</span><span class="r-value">${C}</span></div>
      <div class="result-item"><span class="r-label">Constante K</span><span class="r-value">${K} min⁻¹</span></div>
    </div>
    <div class="result-time">
      <div class="r-label">Tiempo aproximado de enfriamiento</div>
      <div class="r-value">${tCool} minutos</div>
    </div>
    <div class="result-footer">
      <span>Estado del servidor</span>
      <b>Fuera de servicio hasta completar el enfriamiento</b>
    </div>
    <button class="btn-accept" id="acceptCoolBtn">Aceptar</button>
  `;
  consoleBody.appendChild(card);

  document.getElementById('acceptCoolBtn').addEventListener('click', ()=>{
    overlay.classList.remove('show');
    startCooling(serverId, t0, Tm, tCool);
  });
}

/* ===================== COOLING ANIMATION ===================== */
function startCooling(serverId, t0, Tm, minutesToCool){
  const server = servers.find(s=>s.id===serverId);
  if(!server) return;

  server.heating = false;
  server.status = 'cooling';
  renderServers();
  updateSystemStatus();

  const safeTemp = SAFE_TEMP;
  const startTime = Date.now();
  const msPerMinute = 900; // compressed demo time: 1 sim-minute ≈ 0.9s real time
  const duration = Math.max(minutesToCool * msPerMinute, 4000);

  const coolInterval = setInterval(()=>{
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed/duration, 1);
    server.temp = +(t0 - (t0 - safeTemp)*progress).toFixed(1);
    renderServers();

    if(progress >= 1){
      clearInterval(coolInterval);
      server.temp = safeTemp;
      server.status = 'normal';
      renderServers();
      updateSystemStatus();
      clearAlert();
      scheduleOverheat(60000); // next incident in 1 minute
    }
  }, 200);
}
</script>
